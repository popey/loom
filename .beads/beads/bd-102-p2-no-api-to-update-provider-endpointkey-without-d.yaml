id: bd-102
type: task
title: 'P2: No API to update provider endpoint/key without delete+re-register'
description: 'The provider CRUD was simplified in the TokenHub-only refactoring, but there''s no PATCH/PUT endpoint to update a provider''s endpoint URL or API key. The only way to change the endpoint is to delete and re-register (or use the Upsert method in the registry, but that''s not exposed via API). The handlers_providers.go has POST (create) and DELETE, but no PATCH. Fix: Add a PATCH /api/v1/providers/{id} endpoint that calls registry.Upsert() so operators can update endpoint/key without downtime. This is especially important for the bootstrap workflow where the provider needs reconfiguration.'
