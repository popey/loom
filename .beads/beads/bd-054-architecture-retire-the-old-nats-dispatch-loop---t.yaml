id: bd-054
type: task
title: 'Architecture: retire the old NATS dispatch loop - taskexecutor is the canonical path'
description: 'Two parallel dispatch systems exist: (1) Old dispatcher (ralph + NATS publish + named agent workers) and (2) New taskexecutor (direct goroutines per project). They fight over beads, create duplicate assignments, and the old path is the source of most bugs: context canceled cascade, NATS consumer leak, command parameter required errors. The taskexecutor was introduced to replace the dispatch loop but both are still running. The old dispatcher skips 86 aviation beads as no_idle_agents_for_project because of persona hint mismatches, while the taskexecutor handles them fine. Action: (1) Audit which code paths are still using the old dispatcher. (2) Route all bead dispatch through taskexecutor exclusively. (3) Preserve NATS for agent container communication (loom-project-agent) but remove the loom-internal dispatch via NATS for in-process agents. (4) Deprecate WorkerPool in favor of taskexecutor workers. (5) This will eliminate the NATS consumer leak, the context canceled cascade, and the persona-hint dispatch failures in one architectural cleanup.'
