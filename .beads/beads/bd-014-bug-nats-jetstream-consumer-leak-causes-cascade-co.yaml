id: bd-014
type: task
title: 'Bug: NATS JetStream consumer leak causes cascade context cancellations on restart'
description: 'At startup, loom logs: consumer is already bound to a subscription. The durable NATS consumer from the previous process was not cleaned up on shutdown. This prevents the PDA orchestrator from subscribing to loom.results.*, causing worker goroutines for named agents to get immediately-cancelled contexts. Result: 9474 context canceled errors since 2026-02-19, ralph blocking beads, compounding gridlock. Fix: drain NATS on SIGTERM with 5s timeout, force-delete stale consumers on startup, and consider ephemeral consumers for the results subscription.'
