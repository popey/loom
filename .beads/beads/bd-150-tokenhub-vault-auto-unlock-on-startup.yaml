id: bd-150
type: bug
title: 'tokenhub: vault auto-unlock on startup'
description: 'The tokenhub vault locks on service restart but TOKENHUB_VAULT_PASSWORD is available in the container environment. The service should auto-unlock using this env var at startup, or the loom healthcheck should detect a locked vault and auto-unlock it. Currently the vault silently goes locked after restart, causing 100% 502 errors until manually unlocked with ''tokenhubctl vault unlock tokenmeh''. This has caused multiple outages. Fix: tokenhub should check TOKENHUB_VAULT_PASSWORD on startup and auto-unlock if set.'
