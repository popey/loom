id: bd-107
type: task
title: 'P2: Dispatcher spawns goroutines with context.Background() — no cancellation propagation'
description: 'In dispatcher.go line 621, the in-process task execution goroutine uses context.Background() instead of the parent request context. This means: 1) If Loom is shutting down, running tasks can''t be cancelled gracefully, 2) No timeout propagation from the dispatch loop, 3) Goroutines can leak if the provider is unresponsive (only saved by the 5-minute HTTP client timeout). Note: bd-059 already exists for this issue but is blocked. Fix: Use a derived context from the dispatcher''s lifecycle context (not the request context, which has different semantics), with a configurable task timeout.'
