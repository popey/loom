title: 'P2: Provider model ''Qwen/Qwen2.5-Coder-32B-Instruct'' may not be available in TokenHub'
description: 'The Loom provider is configured with model ''Qwen/Qwen2.5-Coder-32B-Instruct'' but this model may not be registered or enabled in the local TokenHub instance. One bead shows a 404 ''model not found'' error. The registry has model auto-rediscovery (registry.go lines 209-224) that retries with the first available model, but this only works if the HTTP connection succeeds at all. Fix: 1) After fixing the endpoint, verify model availability with ''curl http://localhost:8090/v1/models'', 2) Update the Loom provider config to use a model that TokenHub actually has, 3) Consider making the bootstrap script query TokenHub''s model list and auto-configure.'
