id: bd-013
type: task
title: 'Bug: NATS JetStream consumer leak causes cascade context cancellations on restart'
description: 'At startup, loom logs: consumer is already bound to a subscription. The durable NATS consumer from the previous process was not cleaned up on shutdown. This prevents the PDA orchestrator from subscribing to loom.results.*, causing worker goroutines for named agents to get immediately-cancelled contexts. Result: 9,474 context canceled errors since 2026-02-19, ralph blocking beads, compounding gridlock. Fix: (1) Drain NATS connection on SIGTERM with 5s timeout, deleting durable consumers. (2) On startup, if consumer bind fails with already-bound, force-delete and recreate. (3) Consider ephemeral consumers for the results subscription so they auto-delete on disconnect. The context-canceled cascade from this bug was responsible for 85 of 97 aviation beads being ralph-blocked and the system grinding to a halt.'
