id: bd-051
type: task
title: 'loomctl CLI hierarchy: flat structure lacks project-first nesting'
description: 'loomctl has a flat command hierarchy. Context should flow from project downward: ''loomctl project loom bead list'' should be equivalent to ''loomctl bead list --project loom''. The CLI should support: ''loomctl project <id> <resource> <action>'' as the primary interface, with --project flags as secondary. Additionally, ''loomctl project <id>'' alone should show a dashboard of that project''s agents, open beads, recent activity, and container status. This mirrors kubectl''s namespace model (kubectl -n <ns> get pods) and makes context explicit.'
