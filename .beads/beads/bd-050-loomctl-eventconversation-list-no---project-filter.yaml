title: 'loomctl event/conversation list: no --project filter'
description: loomctl event list and loomctl conversation list have no --project flag. In a multi-project system, events and conversations need to be queryable by project. The backend /api/v1/events and /api/v1/conversations endpoints need project_id query params. Add --project flag to both CLI commands and nested routes /api/v1/projects/{id}/events and /api/v1/projects/{id}/conversations. Without this, operators must fetch all events/conversations globally and filter manually.
