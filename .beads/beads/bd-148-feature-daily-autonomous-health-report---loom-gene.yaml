id: bd-148
type: task
title: 'Feature: daily autonomous health report - loom generates its own status summary'
description: 'Every morning (or on-demand via CEO REPL), loom should produce a health report covering all projects. The report should be auto-generated by an agent (CEO persona) using time-series data from the logs table. It should cover: (1) Beads closed in last 24h per project with git commit links. (2) Beads stuck/blocked per project with root causes. (3) Agent performance: avg iterations to complete, token usage, error rate. (4) Provider health and token budget status. (5) Key decisions made by agents. (6) Anomalies: unusual error patterns, agents that never completed a bead. The report should be posted as a bead comment visible in the CEO dashboard. This eliminates the need for an external agent to run diagnostics manually.'
