id: bd-055
type: task
title: 'API/loomctl: --priority 0 (P0) not settable due to zero-value bug'
description: 'The POST /api/v1/beads handler treated priority=0 as ''not set'' and silently overrode it to priority=2 (medium). This made P0 (highest priority) impossible to assign via the API or loomctl. Root cause: handler checked ''if req.Priority == 0 { req.Priority = 2 }'' using a non-pointer int. Fix applied: changed Priority field to *int in request struct so nil vs 0 are distinguishable. This was fixed in the handler but should be audited across all API handlers that use the same anti-pattern for other int fields (e.g., max_hops, timeout values).'
