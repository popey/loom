id: bd-108
type: task
title: 'P2: Remediation system doesn''t distinguish provider errors from agent logic errors'
description: 'The createRemediationBead() function (dispatcher.go line 1094) creates P0 remediation beads when agents get stuck, but it doesn''t check WHY the agent is stuck. If the error is ''connection refused'', ''502 all providers failed'', or ''429 budget exceeded'', creating a remediation bead is pointless — no agent can fix a provider infrastructure problem by modifying code. Fix: In processTaskError() and applyLoopMetadata(), classify the error: if it''s a provider error (network, auth, budget, 5xx), set the bead to a ''provider_error'' state and skip remediation. Only create remediation beads for agent logic errors (parse failures, stagnation, inner loops with actual tool use).'
