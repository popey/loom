title: 'loomctl agent list: missing --project filter and operational columns'
description: 'loomctl agent list has no --project flag, forcing operators to see all agents across all projects mixed together. Also missing columns: provider_id (which LLM provider this agent is using), current_bead (what bead the agent is currently working on), last_active (last heartbeat timestamp), dispatch_count (how many tasks dispatched to this agent). The backend /api/v1/agents endpoint needs a project_id query param. A nested route GET /api/v1/projects/{id}/agents should also be added for project-scoped queries.'
