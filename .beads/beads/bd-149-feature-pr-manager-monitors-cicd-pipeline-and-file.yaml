title: 'Feature: PR manager monitors CI/CD pipeline and files devops beads on failure'
description: |-
    The public-relations-manager persona should proactively check CI/CD pipeline status on GitHub/GitLab for all projects and file P1 devops beads when workflows are failing.

    See SKILL.md for detailed persona instructions.

    Implementation needed:
    - Background goroutine or maintenance loop hook that calls GitHub Actions API (GET /repos/{owner}/{repo}/actions/runs?branch=main&status=failure)
    - Uses GITHUB_TOKEN from connectors config or environment
    - Files bead via internal API when a workflow is red
    - Deduplicates: check for existing open bead with same title prefix before filing
    - 24h escalation path to Engineering Manager
