type: task
title: 'CEO UX: cross-project visibility - global conversation wall and agent targeting'
description: 'The CEO needs to see what ALL agents across ALL projects are doing simultaneously, not just one project at a time. Current gaps: (1) Conversations tab is per-project only - no cross-project activity stream. (2) CEO REPL agent dropdown only shows agents from uiState.project.selectedId - cannot target agents from other projects without a full page-level project switch. (3) No real-time activity wall showing all agent actions as they happen across all projects. (4) Kanban board is per-project only. Required: (A) Global activity feed tab showing a live stream of agent actions across all projects, color-coded by project. (B) CEO REPL should have a project dropdown alongside the agent dropdown, so you can address any agent in any project. (C) The Diagrams tab should have a cross-project org chart showing all projects and their agents. (D) Consider a split-pane view: left side lists all projects with live bead counts, right side shows conversation graph for selected agent.'
