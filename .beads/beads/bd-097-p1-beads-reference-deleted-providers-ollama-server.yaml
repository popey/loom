title: 'P1: Beads reference deleted providers (ollama-server, sparky-local, vllm-local, nvidia-cloud-*)'
description: '35 beads reference ''ollama-server'', 18 reference ''sparky-local'', 15 reference ''vllm-local'', 5 reference ''nvidia-cloud-*'' — all providers that no longer exist after the TokenHub-only refactoring. These ghost provider references in bead context cause confusion in diagnostics and may prevent proper re-dispatch if the dispatcher checks provider_id validity. Fix: 1) Batch-update all blocked beads to set provider_id=tokenhub in context, 2) Add a migration/cleanup step to the bootstrap that clears stale provider references, 3) Consider whether the dispatcher should ignore context.provider_id and always use the live provider selection.'
