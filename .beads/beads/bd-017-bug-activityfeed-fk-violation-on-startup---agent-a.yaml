id: bd-017
type: task
title: 'Bug: activity_feed FK violation on startup - agent activity recorded before agent row exists'
description: 'At every startup, multiple errors appear: Failed to record activity: pq: insert or update on table activity_feed violates foreign key constraint activity_feed_agent_id_fkey. This happens during workermanager restore of paused agents - the agent activity is being written before the agent row is committed to the agents table, or the FK references an agent ID format that does not match the agents table primary key. Impact: activity feed is missing data, startup logs noisy. Fix: ensure agent row is committed before recording activity, or use INSERT ... ON CONFLICT DO NOTHING for the activity record, or defer activity recording until after agent initialization completes.'
