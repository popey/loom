type: task
title: 'loomctl workflow list: --project flag not exposed despite backend support'
description: 'The backend GET /api/v1/workflows endpoint accepts a project_id query parameter, but loomctl workflow list does not expose a --project flag. This means operators cannot filter workflows by project from the CLI, requiring curl or raw API calls. Fix: add --project flag to workflow list and pass it as project_id query param. Also add workflow filtering to GET /api/v1/projects/{id}/workflows nested route for consistency.'
