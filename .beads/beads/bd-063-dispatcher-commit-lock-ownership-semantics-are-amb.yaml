type: task
title: 'dispatcher: commit lock ownership semantics are ambiguous and racy'
description: 'internal/dispatch/dispatcher.go lines 87-92, 344-420: commitLock/commitStateMutex/commitQueue interact with unclear ownership. The queue processor goroutine sends on ResultCh without owning the lock, and lock release is the caller''s responsibility. This violates lock ownership patterns and risks deadlock/race. Fix: refactor so queue processor owns the full lock lifecycle.'
