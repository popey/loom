title: 'loomctl bead show: missing operational fields'
description: loomctl bead show does not display ralph_blocked_reason, error_history, dispatch_count, or close_reason fields from the bead YAML context. These are critical for debugging stuck/blocked beads without resorting to docker exec or raw file reads. The bead show command should render these fields in its output table/JSON. The API response from GET /api/v1/beads/{id} must also include the full context map, not just a subset.
