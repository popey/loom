type: task
title: 'P2: Provider heartbeat never ran — last_heartbeat_at is zero-time'
description: 'The provider shows last_heartbeat_at=''0001-01-01T00:00:00Z'' (Go zero time), meaning the heartbeat activity never executed against this provider. The provider is marked ''healthy'' but that status was set at registration time, not from an actual health check. Without heartbeats, Loom can''t detect when TokenHub goes down, and the ''healthy'' status is a lie. Fix: 1) Verify the Temporal heartbeat workflow is running, 2) Check that the heartbeat activity can reach the provider endpoint, 3) The heartbeat should flip status to ''unhealthy'' if TokenHub is unreachable.'
