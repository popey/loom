id: bd-281
type: task
title: Reframe Decisions tab to reflect autonomous agent handling, not human workflow
description: |-
    PARENT: bd-267 (Phase 3 epic)

    PROBLEM: The Decisions tab has empty-state text 'When agents escalate work requiring human input, it appears here.' and shows Claim/Decide buttons. This implies humans are the primary decision-makers. Loom's design is the opposite: agents handle all decisions autonomously, and the tab should show decisions in flight, recently made, and the rare cases needing human escalation.

    FIXES:

    1. EMPTY STATE: Change to 'No decisions pending human review. Agents are handling decisions autonomously.'

    2. CARD LAYOUT: Add a status section showing which agent is working on a decision (assigned_to field). Show the agent's display name.

    3. HUMAN ESCALATION SECTION: Add a separate 'Requires Human Review' section at the top that only shows decisions with context.requires_human == 'true'. These get the Claim/Decide buttons. Everything else shows read-only with 'Handled by [Agent Name]'.

    4. DECISION HISTORY: Add a 'Recently Decided' section showing the last 10 closed decision beads with the agent's rationale (from bead context).

    5. FILTER: Add a filter for decision type: All / Pending Human / In Progress by Agent / Recently Closed.

    VERIFICATION: The tab should make it clear that agent autonomy is the norm. Human intervention is the exception.
