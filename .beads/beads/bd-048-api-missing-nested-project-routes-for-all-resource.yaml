type: task
title: 'API: missing nested project routes for all resources'
description: 'The API has no nested project routes for most resources, making project-scoped queries impossible without client-side filtering. Missing routes: GET /api/v1/projects/{id}/agents, GET /api/v1/projects/{id}/beads, GET /api/v1/projects/{id}/workflows, GET /api/v1/projects/{id}/logs, GET /api/v1/projects/{id}/events, GET /api/v1/projects/{id}/conversations. These nested routes are fundamental for multi-project installations where an operator wants to see all resources belonging to a specific project without fetching the entire global list.'
