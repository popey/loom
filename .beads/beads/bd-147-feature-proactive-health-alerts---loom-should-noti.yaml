id: bd-147
type: task
title: 'Feature: proactive health alerts - loom should notify CEO when intervention needed'
description: 'After 12 hours of operation, 100% of agents were idle with 0 tokens flowing and required external human diagnosis. Loom should self-diagnose and alert. Required: (1) A health watchdog that runs every 5 minutes and checks: (a) Are any projects stuck with 0 in_progress beads and N+ open beads for >30 minutes? (b) Is the context-canceled error rate above a threshold? (c) Are any beads zombie (in_progress, stale executor ID, >30min)? (d) Is ralph blocking >50% of a projects beads? (2) When a health issue is detected, create a P0 bead assigned to the CEO asking them to investigate. (3) Add a health status section to the CEO dashboard that shows: system health score, top blocking issues, beads needing attention. (4) Optionally: send notifications via configured channels (Slack webhook, email). The CEO should never need to ask how the system is doing - it should tell them proactively.'
