id: bd-061
type: task
title: 'Observability: provider metrics show 0 requests/tokens despite active LLM usage'
description: 'The providers API returns total_requests=0, success_requests=0, total_tokens=0 for the tokenhub provider even though agents have been making LLM calls for 12 hours. The provider metrics counter is only incremented on the old dispatch path and not by the taskexecutor path. This means: (1) Per-project token budgets cannot be enforced. (2) Operator cannot see which projects are consuming the most tokens. (3) Cost tracking is broken. Fix: in taskexecutor actionloop, after each successful LLM completion, increment the provider metrics via the existing metrics recording path. Also add per-project and per-agent token usage tracking to the analytics schema. The CEO dashboard should show a token usage breakdown by project and agent as a first-class metric.'
