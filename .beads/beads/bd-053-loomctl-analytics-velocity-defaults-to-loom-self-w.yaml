title: 'loomctl analytics: velocity defaults to loom-self (wrong default project)'
description: 'loomctl analytics velocity defaults to project_id ''loom-self'' which does not exist (phantom project from early development). This causes all velocity queries to return empty results unless --project is explicitly specified. Fix: either require --project flag (error if not specified), or default to ''loom'' as a sensible fallback, or list all projects'' velocity if --project is omitted. The phantom ''loom-self'' project should also be purged from any hardcoded defaults in the codebase.'
