id: bd-093
type: task
title: 'P0: Provider endpoint points to Docker hostname http://tokenhub:8080/v1 instead of http://localhost:8090/v1'
description: 'The registered TokenHub provider endpoint is ''http://tokenhub:8080/v1'' — a Docker Compose internal hostname that doesn''t resolve outside Docker. The actual TokenHub instance runs on http://localhost:8090/v1. This means EVERY LLM request from Loom fails at the TCP level (connection refused or DNS failure). Fix: Update the provider registration endpoint via the API or bootstrap script to point to the correct URL. This is the single biggest blocker — nothing works until the endpoint is correct.'
