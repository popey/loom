context:
    close_reason: Fixed GET /api/v1/conversations 503 error. The issue was in ListConversationContextsByProject where PostgreSQL parameter placeholders (?) were incorrectly used for the LIMIT clause. PostgreSQL only supports parameter placeholders in WHERE clauses and value expressions, not for LIMIT. Changed to use fmt.Sprintf to embed the limit value directly in the query string while keeping the projectID as a parameter. The limit is validated by the handler to be a positive integer before being passed to the database function. Fix committed and pushed to main.
