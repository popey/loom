id: bd-099
type: task
title: 'P2: Remediation bead cascade — dozens of auto-generated P0 remediation beads from infrastructure failures'
description: 'The auto-remediation system creates P0 beads when agents get stuck. But when the root cause is infrastructure (wrong endpoint, budget exhaustion), remediation beads are created for the remediation beads, creating chains: bd-051 -> bd-078,bd-079,bd-080,bd-081,bd-084,bd-085,bd-086,bd-087,bd-088,bd-090. The depth-1 limit (line 1109 in dispatcher.go) prevents infinite cascades, but the system still generates massive numbers of useless remediation beads. Fix: 1) Add provider-error detection — don''t create remediation beads for connection_refused, 429, or 502 errors, 2) Batch-close all remediation beads whose root cause was a provider failure, 3) Consider rate-limiting remediation bead creation per root bead.'
