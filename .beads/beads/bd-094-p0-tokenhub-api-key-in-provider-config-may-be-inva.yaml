id: bd-094
type: task
title: 'P0: TokenHub API key in provider config may be invalid for local instance'
description: 'The API key stored in Loom''s provider config (tokenhub_1579cc67...) was created during a previous Docker-based deployment. The local TokenHub on port 8090 requires authentication (returns ''authorization required'' without a key). This key may not exist in the local instance''s vault. Fix: Use ''tokenhubctl apikey create'' to create a fresh API key in the local TokenHub, then update the Loom provider registration. Test with: curl -H ''Authorization: Bearer <key>'' http://localhost:8090/v1/models'
