id: bd-016
type: task
title: 'Bug: agent action=done with no commit leaves bead open instead of closing it'
description: 'bd-055 had context.terminal_reason=completed and context.agent_output containing {"action": "done", "reason": "changes already applied and verified. No further changes were needed."} but remained in_progress indefinitely. The agent correctly determined the work was already done and issued a done action, but the system did not close the bead. Root cause: the dispatch_phases.go completed case or taskexecutor closeout logic may require a git commit SHA to be present before closing, or the done action is not being detected when terminal_reason=completed is set but the executor context was already stale. Fix: if agent emits action=done OR action=skip AND provides a reason, close the bead as closed with the agent reason as close_reason, regardless of whether a git commit was made. Work that was already done upstream should be validatable.'
