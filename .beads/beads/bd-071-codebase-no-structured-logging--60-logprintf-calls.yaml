id: bd-071
type: task
title: 'codebase: no structured logging — 60+ log.Printf calls in dispatcher alone'
description: 'The entire codebase uses log.Printf with ad-hoc string prefixes like [Dispatcher], [Commit], [Worker]. This makes log aggregation, filtering, and level-based routing impossible. Fix: adopt a structured logger (log/slog from stdlib, or zap) with typed fields. At minimum standardize on slog which is in the standard library since Go 1.21.'
