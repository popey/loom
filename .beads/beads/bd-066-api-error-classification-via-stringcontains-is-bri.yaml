title: 'api: error classification via string.Contains is brittle'
description: 'internal/api/handlers.go lines 122-127, handlers_beads.go lines 145, 180, 206: HTTP error codes are determined by checking error message strings (e.g. strings.Contains(err.Error(), "not found")). This breaks silently when error messages change. Fix: define sentinel error types (var ErrNotFound = errors.New("not found")) and use errors.Is() for classification.'
